name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * 1,4' # Runs every Monday and Thursday at 00:00 UTC
  workflow_dispatch:      # Allows you to run it manually from GitHub UI

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send a heartbeat ping to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/User?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
